appId: kr.co.zime.xpad-mini-now-playing
productName: XPAD Mini Now Playing
# node-hid ships a prebuilt N-API binary; no toolchain rebuild needed.
npmRebuild: false
directories:
  output: dist
files:
  - out/**
extraResources:
  - from: assets/tray
    to: assets/tray
win:
  target:
    - nsis
  icon: build/icon.png
nsis:
  oneClick: true
  perMachine: false
mac:
  target:
    - target: dmg
      arch: [arm64, x64]
  category: public.app-category.music
  hardenedRuntime: true
  extendInfo:
    NSAppleEventsUsageDescription: Spotify와 Apple Music에서 현재 재생 중인 곡 정보를 읽는 데 사용합니다.
