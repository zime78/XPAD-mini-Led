<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="960" viewBox="0 0 1440 960" role="img" aria-labelledby="title desc">
  <title id="title">XPAD Mini 키보드 설정 GUI 시안</title>
  <desc id="desc">재생 창의 키보드 설정 아이콘과 XPAD Mini 하단 물리 버튼 3개만 수정하는 키 설정 화면</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#182230"/>
      <stop offset="0.48" stop-color="#080b10"/>
      <stop offset="1" stop-color="#05070b"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#111b28"/>
      <stop offset="1" stop-color="#0c121b"/>
    </linearGradient>
    <linearGradient id="selected" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2563eb"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000" flood-opacity="0.38"/>
    </filter>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif; }
      .title { fill: #f8fafc; font-size: 30px; font-weight: 750; letter-spacing: -.5px; }
      .heading { fill: #f8fafc; font-size: 21px; font-weight: 700; }
      .label { fill: #cbd5e1; font-size: 14px; font-weight: 650; }
      .body { fill: #94a3b8; font-size: 13px; }
      .micro { fill: #64748b; font-size: 11px; }
      .buttonText { fill: #f8fafc; font-size: 13px; font-weight: 700; }
      .deviceStroke { fill: none; stroke: #6b819d; stroke-width: 2; }
    </style>
  </defs>

  <rect width="1440" height="960" fill="url(#background)"/>
  <circle cx="1220" cy="70" r="230" fill="#2563eb" opacity=".06"/>
  <circle cx="120" cy="900" r="260" fill="#1ed760" opacity=".035"/>

  <text x="64" y="58" class="title">XPAD Mini 키보드 설정</text>
  <text x="64" y="84" class="body">실제 장치 배치에서 키를 고르고, 음악 제어나 macOS 앱 실행을 연결합니다.</text>
  <rect x="1175" y="43" width="201" height="36" rx="18" fill="#0f2c20" stroke="#24563a"/>
  <circle cx="1197" cy="61" r="5" fill="#4ade80"/>
  <text x="1210" y="66" fill="#86efac" font-size="12" font-weight="650">RAM 임시 적용 · 종료 시 원복</text>

  <g filter="url(#shadow)">
    <rect x="64" y="112" width="1312" height="104" rx="20" fill="#0f1722" stroke="#263244"/>
  </g>
  <text x="88" y="141" class="micro">재생 창 진입점</text>
  <rect x="88" y="156" width="34" height="26" rx="8" fill="#0a111a" stroke="#24563a"/>
  <circle cx="105" cy="169" r="5" fill="#4ade80"/>
  <text x="136" y="174" class="label">XPAD Mini 연결됨</text>
  <text x="286" y="174" class="body">Now Playing</text>

  <rect x="1240" y="137" width="52" height="52" rx="13" fill="#152235" stroke="#60a5fa" stroke-width="2"/>
  <rect x="1252" y="151" width="28" height="21" rx="4" fill="none" stroke="#f8fafc" stroke-width="2"/>
  <path d="M1257 157h2m4 0h2m4 0h2m-14 5h2m4 0h2m4 0h2m-13 5h12" stroke="#f8fafc" stroke-width="2" stroke-linecap="round"/>
  <circle cx="1284" cy="145" r="6" fill="#2563eb"/>
  <text x="1222" y="203" class="micro">키보드 설정</text>

  <rect x="1304" y="137" width="52" height="52" rx="13" fill="#111827" stroke="#334155" stroke-width="2"/>
  <circle cx="1330" cy="163" r="7" fill="none" stroke="#f8fafc" stroke-width="2"/>
  <path d="M1330 148v4m0 22v4m-15-15h4m22 0h4m-25.6-10.6 2.8 2.8m15.6 15.6 2.8 2.8m0-21.2-2.8 2.8m-15.6 15.6-2.8 2.8" stroke="#f8fafc" stroke-width="2" stroke-linecap="round"/>
  <text x="1315" y="203" class="micro">일반 설정</text>

  <g filter="url(#shadow)">
    <rect x="64" y="248" width="1312" height="648" rx="24" fill="#0b1119" stroke="#263244"/>
  </g>
  <rect x="64" y="248" width="1312" height="78" rx="24" fill="#0f1722"/>
  <path d="M64 302h1312v24H64z" fill="#0f1722"/>
  <text x="96" y="283" class="heading">키보드 설정</text>
  <text x="96" y="306" class="body">하단 물리 버튼 3개만 선택해 동작을 지정하세요. 볼륨·노브 기능은 변경하지 않습니다.</text>
  <rect x="1120" y="270" width="150" height="34" rx="17" fill="#0f2c20" stroke="#24563a"/>
  <circle cx="1140" cy="287" r="5" fill="#4ade80"/>
  <text x="1153" y="292" class="label">장치 연결됨</text>
  <rect x="1290" y="266" width="42" height="42" rx="11" fill="#111827" stroke="#334155"/>
  <path d="m1303 279 16 16m0-16-16 16" stroke="#f8fafc" stroke-width="2" stroke-linecap="round"/>

  <rect x="96" y="350" width="232" height="42" rx="12" fill="#152235" stroke="#60a5fa"/>
  <circle cx="118" cy="371" r="12" fill="#2563eb"/>
  <text x="114" y="376" class="buttonText">1</text>
  <text x="139" y="376" class="label">키 선택</text>
  <rect x="340" y="350" width="232" height="42" rx="12" fill="#111827" stroke="#334155"/>
  <circle cx="362" cy="371" r="12" fill="#1e293b"/>
  <text x="358" y="376" class="buttonText">2</text>
  <text x="383" y="376" class="label">동작 선택</text>
  <rect x="584" y="350" width="232" height="42" rx="12" fill="#111827" stroke="#334155"/>
  <circle cx="606" cy="371" r="12" fill="#1e293b"/>
  <text x="602" y="376" class="buttonText">3</text>
  <text x="627" y="376" class="label">장치에 적용</text>

  <rect x="96" y="414" width="720" height="405" rx="20" fill="#0d141e" stroke="#263244"/>
  <text x="120" y="445" class="label">수정 대상: 하단 물리 버튼 3개만</text>
  <text x="120" y="466" class="micro">노브·PF1·화면·원형 컨트롤은 편집 대상이 아닙니다.</text>

  <g transform="translate(182 488)">
    <path d="M38 0h426c20 0 36 16 36 36v226c0 22-18 40-40 40H40c-22 0-40-18-40-40V38C0 17 17 0 38 0Z" fill="#101a27" stroke="#6b819d" stroke-width="2"/>
    <rect x="22" y="24" width="456" height="52" rx="12" fill="#0f2c20" stroke="#24563a"/>
    <circle cx="43" cy="50" r="5" fill="#4ade80"/>
    <text x="58" y="47" fill="#86efac" font-size="12" font-weight="700">편집 범위 고정</text>
    <text x="58" y="64" class="micro">기존 볼륨·노브 기능과 완전히 분리</text>

    <rect x="22" y="116" width="137" height="118" rx="15" fill="#111827" stroke="#6b819d" stroke-width="2"/>
    <text x="48" y="159" class="micro">왼쪽 버튼</text>
    <text x="48" y="190" class="label">이전 곡</text>
    <rect x="181" y="116" width="137" height="118" rx="15" fill="#111827" stroke="#6b819d" stroke-width="2"/>
    <text x="205" y="159" class="micro">가운데 버튼</text>
    <text x="205" y="190" class="label">재생/일시정지</text>
    <rect x="340" y="116" width="137" height="118" rx="15" fill="url(#selected)" stroke="#93c5fd" stroke-width="2"/>
    <rect x="386" y="105" width="46" height="22" rx="11" fill="#dbeafe"/>
    <text x="394" y="120" fill="#1d4ed8" font-size="10" font-weight="750">선택됨</text>
    <text x="364" y="159" fill="#dbeafe" font-size="11">오른쪽 버튼</text>
    <text x="364" y="190" fill="#fff" font-size="14" font-weight="700">VS Code 실행</text>
    <text x="139" y="271" class="micro">이 세 버튼 외 장치 입력은 표시·선택·수정하지 않습니다.</text>
  </g>

  <rect x="844" y="350" width="500" height="469" rx="20" fill="url(#panel)" stroke="#263244"/>
  <text x="872" y="386" class="micro">선택한 키</text>
  <text x="872" y="416" class="heading">오른쪽 키</text>
  <text x="872" y="443" class="label">동작 종류</text>
  <rect x="872" y="459" width="444" height="44" rx="11" fill="#0a111a" stroke="#334155"/>
  <rect x="1093" y="463" width="219" height="36" rx="9" fill="#2563eb"/>
  <text x="942" y="487" class="label">음악 제어</text>
  <text x="1167" y="487" class="buttonText">앱 실행</text>

  <text x="872" y="537" class="label">실행할 애플리케이션</text>
  <rect x="872" y="553" width="444" height="82" rx="14" fill="#0a111a" stroke="#334155"/>
  <rect x="888" y="569" width="48" height="48" rx="12" fill="#1d4ed8"/>
  <path d="M901 582l10 8-10 8m22-24-12 32" fill="none" stroke="#dbeafe" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="952" y="582" class="label">Visual Studio Code</text>
  <text x="952" y="605" class="micro">/Applications/Visual Studio Code.app</text>
  <rect x="1207" y="575" width="91" height="36" rx="9" fill="#111827" stroke="#334155"/>
  <text x="1224" y="598" class="label">앱 선택…</text>

  <rect x="872" y="653" width="140" height="40" rx="10" fill="#111827" stroke="#334155"/>
  <path d="M891 667v12l10-6z" fill="#94a3b8"/>
  <text x="910" y="679" class="label">테스트 실행</text>
  <text x="872" y="724" class="micro">앱 경로가 바뀌거나 삭제되면 실행하지 않고 오류를 표시합니다.</text>

  <rect x="872" y="752" width="150" height="44" rx="11" fill="#111827" stroke="#334155"/>
  <text x="895" y="779" class="label">원래 키로 복원</text>
  <rect x="1117" y="752" width="199" height="44" rx="11" fill="#2563eb"/>
  <text x="1170" y="779" class="buttonText">장치에 적용</text>

  <rect x="96" y="840" width="1248" height="34" rx="10" fill="#171407" stroke="#5b4815"/>
  <path d="M118 849l8 15h-16z" fill="#fbbf24"/>
  <text x="138" y="862" fill="#fde68a" font-size="12" font-weight="650">하단 버튼 3개만 RAM에 임시 적용합니다. 기존 볼륨·노브, Save·펌웨어·LED는 변경하지 않습니다.</text>

  <text x="64" y="930" class="micro">GUI concept · 2026-07-22 · existing XPAD Mini Now Playing dark theme</text>
</svg>
