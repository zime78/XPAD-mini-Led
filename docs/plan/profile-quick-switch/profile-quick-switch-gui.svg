<svg xmlns="http://www.w3.org/2000/svg" width="1366" height="630" viewBox="0 0 1366 630">
  <defs>
    <linearGradient id="windowBackground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#111820"/>
      <stop offset="1" stop-color="#070a0f"/>
    </linearGradient>
    <linearGradient id="deviceShell" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#364052"/>
      <stop offset="0.58" stop-color="#111720"/>
      <stop offset="1" stop-color="#080b10"/>
    </linearGradient>
    <linearGradient id="albumArt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#315786"/>
      <stop offset="0.45" stop-color="#7390a9"/>
      <stop offset="0.72" stop-color="#d5e4eb"/>
      <stop offset="1" stop-color="#536b87"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
    <filter id="blueGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#60a5fa" flood-opacity="0.55"/>
    </filter>
    <filter id="greenGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#4ade80" flood-opacity="0.7"/>
    </filter>
  </defs>

  <rect width="1366" height="630" fill="url(#windowBackground)"/>

  <!-- macOS title bar -->
  <rect x="0" y="0" width="1366" height="48" fill="#1d2321"/>
  <circle cx="34" cy="16" r="14" fill="#ff4654"/>
  <circle cx="80" cy="16" r="14" fill="#ffbd0c"/>
  <circle cx="126" cy="16" r="14" fill="#59605d"/>
  <text x="170" y="25" fill="#b9bebc" font-family="-apple-system, BlinkMacSystemFont, Apple SD Gothic Neo, sans-serif" font-size="28" font-weight="700">XPAD Mini Now Playing</text>

  <!-- player panel -->
  <rect x="15" y="60" width="1336" height="531" rx="36" fill="#0d1520" fill-opacity="0.96" stroke="#263244" stroke-width="2"/>

  <!-- status icons -->
  <g aria-label="장치 상태">
    <rect x="56" y="94" width="68" height="52" rx="16" fill="#0a111a" stroke="#24563a" stroke-width="2"/>
    <path d="M80 108v24M72 116l8-8 8 8M72 126h-6v8M88 122h6v8" fill="none" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="109" cy="120" r="8" fill="#4ade80" filter="url(#greenGlow)"/>

    <rect x="136" y="94" width="68" height="52" rx="16" fill="#0a111a" stroke="#24563a" stroke-width="2"/>
    <rect x="149" y="108" width="23" height="17" rx="2" fill="none" stroke="#94a3b8" stroke-width="2.5"/>
    <path d="M156 130h10M161 125v5M153 117h4l3-4 3 8 3-4h3" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
    <circle cx="189" cy="120" r="8" fill="#4ade80" filter="url(#greenGlow)"/>

    <rect x="216" y="94" width="68" height="52" rx="16" fill="#0a111a" stroke="#24563a" stroke-width="2"/>
    <circle cx="240" cy="120" r="12" fill="none" stroke="#94a3b8" stroke-width="2.5"/>
    <path d="M240 120v-8M232 132h16" fill="none" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="269" cy="120" r="8" fill="#4ade80" filter="url(#greenGlow)"/>
  </g>

  <!-- visual separation -->
  <line x1="306" y1="96" x2="306" y2="180" stroke="#263244" stroke-width="2"/>

  <!-- profile quick switch -->
  <g aria-label="프로파일 단축 전환">
    <g transform="translate(0,-14)">
    <g>
      <rect x="330" y="108" width="58" height="38" rx="11" fill="#111827" stroke="#334155" stroke-width="2"/>
      <text x="359" y="132" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="15" font-weight="800">P1</text>
    </g>
    <g>
      <rect x="398" y="108" width="58" height="38" rx="11" fill="#111827" stroke="#334155" stroke-width="2"/>
      <text x="427" y="132" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="15" font-weight="800">P2</text>
    </g>
    <g filter="url(#blueGlow)">
      <rect x="466" y="108" width="58" height="38" rx="11" fill="#2563eb" stroke="#93c5fd" stroke-width="2"/>
      <text x="495" y="132" text-anchor="middle" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="15" font-weight="800">P3</text>
      <circle cx="516" cy="115" r="4" fill="#dbeafe"/>
    </g>
    <g>
      <rect x="534" y="108" width="58" height="38" rx="11" fill="#111827" stroke="#334155" stroke-width="2"/>
      <text x="563" y="132" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="15" font-weight="800">P4</text>
    </g>
    <g>
      <rect x="602" y="108" width="58" height="38" rx="11" fill="#111827" stroke="#334155" stroke-width="2"/>
      <text x="631" y="132" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="15" font-weight="800">P5</text>
    </g>

    <!-- selected profile keys: three independent buttons -->
    <g>
      <rect x="330" y="154" width="140" height="38" rx="11" fill="#0a111a" stroke="#334155" stroke-width="2"/>
      <text x="344" y="178" fill="#64748b" font-family="-apple-system, BlinkMacSystemFont, Apple SD Gothic Neo, sans-serif" font-size="10" font-weight="700">왼쪽</text>
      <rect x="403" y="161" width="56" height="24" rx="8" fill="#17365f" stroke="#3b82f6"/>
      <text x="431" y="178" text-anchor="middle" fill="#eff6ff" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" font-weight="900">Q</text>
    </g>

    <g>
      <rect x="480" y="154" width="162" height="38" rx="11" fill="#0a111a" stroke="#334155" stroke-width="2"/>
      <text x="494" y="178" fill="#64748b" font-family="-apple-system, BlinkMacSystemFont, Apple SD Gothic Neo, sans-serif" font-size="10" font-weight="700">가운데</text>
      <rect x="552" y="161" width="79" height="24" rx="8" fill="#17365f" stroke="#3b82f6"/>
      <text x="591.5" y="178" text-anchor="middle" fill="#eff6ff" font-family="-apple-system, BlinkMacSystemFont, Apple SD Gothic Neo, sans-serif" font-size="11" font-weight="900">Safari</text>
    </g>

    <g>
      <rect x="652" y="154" width="140" height="38" rx="11" fill="#0a111a" stroke="#334155" stroke-width="2"/>
      <text x="666" y="178" fill="#64748b" font-family="-apple-system, BlinkMacSystemFont, Apple SD Gothic Neo, sans-serif" font-size="10" font-weight="700">오른쪽</text>
      <rect x="725" y="161" width="56" height="24" rx="8" fill="#17365f" stroke="#3b82f6"/>
      <text x="753" y="178" text-anchor="middle" fill="#eff6ff" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="900">F5</text>
    </g>
    </g>
  </g>

  <!-- action buttons -->
  <g aria-label="화면 동작">
    <rect x="1132" y="88" width="80" height="80" rx="20" fill="#101923" stroke="#334155" stroke-width="2"/>
    <rect x="1157" y="116" width="30" height="22" rx="3" fill="none" stroke="#f8fafc" stroke-width="3"/>
    <path d="M1163 123h.01M1170 123h.01M1177 123h.01M1182 123h.01M1163 130h.01M1170 130h.01M1177 130h6M1163 135h19" fill="none" stroke="#f8fafc" stroke-width="2.4" stroke-linecap="round"/>

    <rect x="1228" y="88" width="80" height="80" rx="20" fill="#101923" stroke="#334155" stroke-width="2"/>
    <circle cx="1268" cy="128" r="10" fill="none" stroke="#f8fafc" stroke-width="3"/>
    <path d="M1268 110v-7M1268 153v-7M1250 128h-7M1293 128h-7M1255 115l-5-5M1286 146l-5-5M1281 115l5-5M1250 146l5-5" fill="none" stroke="#f8fafc" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- LCD device preview -->
  <g filter="url(#softShadow)">
    <rect x="56" y="214" width="576" height="336" rx="44" fill="url(#deviceShell)" stroke="#64748b" stroke-width="5"/>
    <rect x="88" y="248" width="488" height="246" rx="14" fill="#05070a" stroke="#020304" stroke-width="5"/>
    <rect x="104" y="264" width="218" height="214" rx="12" fill="url(#albumArt)"/>
    <path d="M118 462c38-56 47-85 70-123 17-29 32-48 52-64 9 22 25 46 57 71v116z" fill="#e6edf1" fill-opacity="0.76"/>
    <circle cx="225" cy="337" r="45" fill="#273f5e" fill-opacity="0.65"/>
    <text x="337" y="277" fill="#ff6478" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="15" font-weight="900" letter-spacing="1.4">APPLE MUSIC</text>
    <text x="337" y="317" fill="#f8fafc" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="800">Blue Valen</text>
    <text x="337" y="350" fill="#f8fafc" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="800">tine</text>
    <text x="337" y="402" fill="#cbd5e1" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="20" font-weight="700">NMIXX</text>
    <text x="337" y="438" fill="#64748b" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="16">Blue Valentine</text>
    <text x="337" y="468" fill="#ff2d55" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="22" font-weight="800">Ⅱ</text>
    <rect x="370" y="454" width="172" height="10" rx="5" fill="#263141"/>
  </g>

  <!-- track information -->
  <g>
    <rect x="700" y="240" width="178" height="40" rx="20" fill="#451722"/>
    <text x="789" y="266" text-anchor="middle" fill="#ff6478" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="20" font-weight="900" letter-spacing="1.7">Apple Music</text>
    <text x="700" y="340" fill="#f8fafc" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="44" font-weight="800">Blue Valentine</text>
    <text x="700" y="396" fill="#cbd5e1" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="31">NMIXX</text>
    <text x="700" y="438" fill="#64748b" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="27">Blue Valentine</text>
    <text x="700" y="494" fill="#60a5fa" font-family="-apple-system, BlinkMacSystemFont, Apple SD Gothic Neo, sans-serif" font-size="26" font-weight="800">일시 정지</text>
  </g>
</svg>
